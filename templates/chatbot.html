<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EDGAR Data Chatbot</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
    :root {
        --bg: #0f1419;
        --bg-elev: #1a1f2a;
        --bg-hover: #232936;
        --border: #2a3342;
        --text: #e6e6e6;
        --text-muted: #8a93a8;
        --accent: #6366f1;
        --accent-hover: #7c7fe6;
        --user-bubble: #6366f1;
        --assistant-bubble: #1a1f2a;
        --green: #10b981;
        --red: #ef4444;
        --amber: #f59e0b;
        --mono: 'SF Mono', 'Monaco', 'Consolas', monospace;
    }
    [data-theme="light"] {
        --bg: #fafaf9;
        --bg-elev: #ffffff;
        --bg-hover: #f4f4f5;
        --border: #e5e5e5;
        --text: #171717;
        --text-muted: #737373;
        --assistant-bubble: #f4f4f5;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg); color: var(--text);
        height: 100vh; display: flex; overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
        width: 260px; background: var(--bg-elev);
        border-right: 1px solid var(--border);
        display: flex; flex-direction: column;
        padding: 1rem;
    }
    .sidebar h1 {
        font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem;
        display: flex; align-items: center; gap: 0.5rem;
    }
    .sidebar h1 .logo {
        width: 28px; height: 28px; background: var(--accent);
        border-radius: 6px; display: flex; align-items: center;
        justify-content: center; font-weight: 800; font-size: 0.8rem; color: white;
    }
    .sidebar-sub {
        font-size: 0.72rem; color: var(--text-muted); margin-bottom: 1rem;
    }
    .new-chat-btn {
        background: var(--accent); color: white; border: none;
        padding: 0.6rem 0.9rem; border-radius: 8px; cursor: pointer;
        font-weight: 600; font-size: 0.85rem; width: 100%;
        margin-bottom: 1rem; transition: background 0.15s;
    }
    .new-chat-btn:hover { background: var(--accent-hover); }

    .sidebar-section-title {
        font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
        color: var(--text-muted); margin: 0.75rem 0 0.4rem 0.25rem;
        letter-spacing: 0.05em;
    }
    .conv-list { flex: 1; overflow-y: auto; }
    .conv-item {
        padding: 0.5rem 0.6rem; border-radius: 6px; cursor: pointer;
        font-size: 0.78rem; margin-bottom: 0.2rem;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        transition: background 0.1s;
    }
    .conv-item:hover { background: var(--bg-hover); }
    .conv-item.active { background: var(--bg-hover); font-weight: 600; }

    .sidebar-footer {
        padding-top: 0.75rem; border-top: 1px solid var(--border);
        font-size: 0.7rem; color: var(--text-muted);
    }
    .health-indicator { display: flex; align-items: center; gap: 0.4rem; }
    .dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--green);
    }
    .dot.bad { background: var(--red); }

    /* Main chat area */
    .main {
        flex: 1; display: flex; flex-direction: column;
        overflow: hidden;
    }
    .chat-container {
        flex: 1; overflow-y: auto; padding: 1.5rem 2rem;
    }
    .messages {
        max-width: 860px; margin: 0 auto;
    }

    .welcome {
        text-align: center; margin-top: 3rem;
    }
    .welcome h2 {
        font-size: 1.4rem; margin-bottom: 0.5rem;
    }
    .welcome p {
        color: var(--text-muted); margin-bottom: 1.5rem;
    }
    .suggestions {
        display: grid; grid-template-columns: 1fr 1fr;
        gap: 0.75rem; max-width: 700px; margin: 0 auto;
    }
    .suggestion-group {
        background: var(--bg-elev); border: 1px solid var(--border);
        border-radius: 10px; padding: 0.9rem;
    }
    .suggestion-group-title {
        font-size: 0.72rem; font-weight: 700; color: var(--accent);
        margin-bottom: 0.5rem; text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .suggestion-item {
        display: block; text-align: left; width: 100%;
        padding: 0.4rem 0.5rem; margin: 0.15rem 0;
        background: none; border: none; color: var(--text);
        font-size: 0.78rem; border-radius: 5px; cursor: pointer;
        transition: background 0.1s;
    }
    .suggestion-item:hover { background: var(--bg-hover); }

    .turn { margin-bottom: 1.5rem; }
    .user-msg {
        background: var(--user-bubble); color: white;
        padding: 0.7rem 1rem; border-radius: 14px 14px 2px 14px;
        max-width: 70%; margin-left: auto; width: fit-content;
        font-size: 0.9rem; line-height: 1.5;
    }
    .assistant-msg {
        background: var(--assistant-bubble); color: var(--text);
        padding: 0.8rem 1.1rem; border-radius: 14px 14px 14px 2px;
        max-width: 85%; margin-top: 0.6rem; line-height: 1.55;
        font-size: 0.9rem;
    }
    .assistant-msg p { margin: 0.5rem 0; }
    .assistant-msg p:first-child { margin-top: 0; }
    .assistant-msg p:last-child { margin-bottom: 0; }
    .assistant-msg h1, .assistant-msg h2, .assistant-msg h3 {
        margin: 0.6rem 0 0.3rem; font-weight: 700;
    }
    .assistant-msg h2 { font-size: 1rem; }
    .assistant-msg h3 { font-size: 0.9rem; }
    .assistant-msg ul, .assistant-msg ol {
        padding-left: 1.3rem; margin: 0.4rem 0;
    }
    .assistant-msg li { margin: 0.2rem 0; }
    .assistant-msg strong { font-weight: 700; }
    .assistant-msg code {
        background: rgba(100,100,100,0.15);
        padding: 0.05em 0.3em; border-radius: 3px;
        font-family: var(--mono); font-size: 0.84em;
    }
    .assistant-msg pre {
        background: var(--bg); border: 1px solid var(--border);
        padding: 0.7rem 0.9rem; border-radius: 6px;
        overflow-x: auto; margin: 0.6rem 0;
    }
    .assistant-msg pre code {
        background: none; padding: 0; font-size: 0.78rem;
        line-height: 1.5;
    }
    .assistant-msg table {
        width: 100%; border-collapse: collapse; margin: 0.6rem 0;
        font-size: 0.82rem;
    }
    .assistant-msg th, .assistant-msg td {
        padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--border);
        text-align: left;
    }
    .assistant-msg th { font-weight: 700; }

    .turn-meta {
        display: flex; gap: 0.7rem; align-items: center;
        margin-top: 0.5rem; font-size: 0.7rem; color: var(--text-muted);
    }
    .sql-toggle {
        background: none; border: 1px solid var(--border);
        color: var(--text-muted); padding: 0.2rem 0.5rem;
        border-radius: 4px; cursor: pointer; font-size: 0.7rem;
    }
    .sql-toggle:hover { background: var(--bg-hover); color: var(--text); }
    .sql-panel {
        margin-top: 0.5rem; padding: 0.7rem;
        background: var(--bg); border: 1px solid var(--border);
        border-radius: 6px; font-family: var(--mono);
        font-size: 0.76rem; white-space: pre-wrap;
        color: var(--text-muted); display: none;
    }
    .sql-panel.show { display: block; color: var(--text); }

    .data-table-wrapper {
        margin-top: 0.5rem; max-height: 400px; overflow: auto;
        border: 1px solid var(--border); border-radius: 6px;
        display: none;
    }
    .data-table-wrapper.show { display: block; }
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.76rem; }
    .data-table th {
        background: var(--bg-elev); padding: 0.5rem 0.7rem;
        text-align: left; font-weight: 700; border-bottom: 2px solid var(--border);
        position: sticky; top: 0;
    }
    .data-table td {
        padding: 0.4rem 0.7rem; border-bottom: 1px solid var(--border);
        white-space: nowrap;
    }
    .data-table tr:hover td { background: var(--bg-hover); }

    .input-wrapper {
        padding: 1rem 2rem 1.5rem; border-top: 1px solid var(--border);
    }
    .input-container {
        max-width: 860px; margin: 0 auto;
        background: var(--bg-elev); border: 1px solid var(--border);
        border-radius: 14px; display: flex; align-items: flex-end;
        padding: 0.5rem 0.6rem;
        transition: border-color 0.15s;
    }
    .input-container:focus-within { border-color: var(--accent); }
    #questionInput {
        flex: 1; background: none; border: none; outline: none;
        color: var(--text); font-size: 0.9rem; padding: 0.5rem;
        resize: none; min-height: 22px; max-height: 150px;
        font-family: inherit; line-height: 1.4;
    }
    .send-btn {
        background: var(--accent); color: white; border: none;
        padding: 0.5rem 0.9rem; border-radius: 8px; cursor: pointer;
        font-weight: 600; font-size: 0.82rem;
        transition: background 0.15s;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled {
        background: var(--border); cursor: not-allowed; opacity: 0.6;
    }

    .thinking {
        display: inline-flex; gap: 0.2rem; padding: 0.2rem 0;
    }
    .thinking .dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--text-muted);
        animation: pulse 1.4s infinite;
    }
    .thinking .dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
        0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
        30% { opacity: 1; transform: scale(1); }
    }

    .error-msg {
        background: rgba(239, 68, 68, 0.1); color: var(--red);
        padding: 0.5rem 0.7rem; border-radius: 6px;
        border: 1px solid rgba(239, 68, 68, 0.3);
        font-size: 0.82rem; margin-top: 0.5rem;
    }

    .theme-toggle {
        position: fixed; top: 0.7rem; right: 0.9rem;
        background: var(--bg-elev); border: 1px solid var(--border);
        border-radius: 6px; padding: 0.3rem 0.5rem;
        cursor: pointer; font-size: 0.75rem; color: var(--text);
        z-index: 10;
    }
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌓 Theme</button>

<aside class="sidebar">
    <h1>
        <span class="logo">📊</span>
        EDGAR Chat
    </h1>
    <div class="sidebar-sub">Query your extracted data in plain English</div>
    <button class="new-chat-btn" onclick="newConversation()">+ New Chat</button>

    <div class="sidebar-section-title">Recent Chats</div>
    <div class="conv-list" id="convList"></div>

    <div class="sidebar-footer">
        <div class="health-indicator">
            <span class="dot" id="healthDot"></span>
            <span id="healthText">Checking...</span>
        </div>
    </div>
</aside>

<main class="main">
    <div class="chat-container" id="chatContainer">
        <div class="messages" id="messages">
            <div class="welcome" id="welcome">
                <h2>Ask anything about your EDGAR data</h2>
                <p>I translate your questions into SQL and query the extraction database.</p>
                <div class="suggestions" id="suggestions"></div>
            </div>
        </div>
    </div>

    <div class="input-wrapper">
        <div class="input-container">
            <textarea id="questionInput"
                placeholder="Ask a question about extractions, filings, NAVs, distributions..."
                rows="1" onkeydown="handleKey(event)" oninput="autoGrow(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendQuestion()">Send</button>
        </div>
    </div>
</main>

<script>
let currentConvId = null;
let allConvs = [];

// Markdown parser (lightweight)
function renderMarkdown(text) {
    if (!text) return '';
    let html = text;

    // Code blocks (```lang\n...\n```)
    html = html.replace(/```(\w+)?\n([\s\S]*?)\n```/g, (m, lang, code) => {
        return `<pre><code>${escapeHtml(code)}</code></pre>`;
    });

    // Inline code
    html = html.replace(/`([^`]+)`/g, (m, code) => `<code>${escapeHtml(code)}</code>`);

    // Headers
    html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

    // Bold / italic
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

    // Markdown tables
    const lines = html.split('\n');
    const out = [];
    let i = 0;
    while (i < lines.length) {
        const line = lines[i];
        if (line.match(/^\s*\|.+\|\s*$/) && lines[i+1]?.match(/^\s*\|[\s\-:|]+\|\s*$/)) {
            // Table detected
            const header = line.split('|').slice(1, -1).map(c => c.trim());
            const rows = [];
            i += 2;
            while (i < lines.length && lines[i].match(/^\s*\|.+\|\s*$/)) {
                rows.push(lines[i].split('|').slice(1, -1).map(c => c.trim()));
                i++;
            }
            let tableHtml = '<table><thead><tr>';
            header.forEach(h => tableHtml += `<th>${h}</th>`);
            tableHtml += '</tr></thead><tbody>';
            rows.forEach(r => {
                tableHtml += '<tr>';
                r.forEach(c => tableHtml += `<td>${c}</td>`);
                tableHtml += '</tr>';
            });
            tableHtml += '</tbody></table>';
            out.push(tableHtml);
        } else {
            out.push(line);
            i++;
        }
    }
    html = out.join('\n');

    // Lists
    html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);

    // Paragraphs
    html = html.split(/\n\n+/).map(p => {
        p = p.trim();
        if (!p) return '';
        if (p.startsWith('<')) return p;
        return `<p>${p.replace(/\n/g, '<br>')}</p>`;
    }).join('\n');

    return html;
}

function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function autoGrow(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 150) + 'px';
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendQuestion();
    }
}

function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    const next = cur === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('edgar-chat-theme', next); } catch(e) {}
}

(function initTheme() {
    try {
        const saved = localStorage.getItem('edgar-chat-theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
    } catch(e) {}
})();

async function loadSuggestions() {
    try {
        const resp = await fetch('/api/suggestions');
        const data = await resp.json();
        const c = document.getElementById('suggestions');
        c.innerHTML = data.suggestions.map(g => `
            <div class="suggestion-group">
                <div class="suggestion-group-title">${escapeHtml(g.category)}</div>
                ${g.questions.map(q => `<button class="suggestion-item" onclick="askQuestion('${escapeHtml(q).replace(/'/g, "\\'")}')">${escapeHtml(q)}</button>`).join('')}
            </div>
        `).join('');
    } catch(e) {
        console.error('Failed to load suggestions:', e);
    }
}

async function loadConversations() {
    try {
        const resp = await fetch('/api/conversations');
        const convs = await resp.json();
        allConvs = convs;
        const list = document.getElementById('convList');
        if (!convs.length) {
            list.innerHTML = '<div style="padding:0.5rem;color:var(--text-muted);font-size:0.75rem">No previous chats</div>';
            return;
        }
        list.innerHTML = convs.map(c => `
            <div class="conv-item ${c.id === currentConvId ? 'active' : ''}"
                 onclick="loadConversation('${c.id}')" title="${c.turn_count} turn(s)">
                ${escapeHtml(c.first_question || c.id)}
            </div>
        `).join('');
    } catch(e) {
        console.error('Failed to load conversations:', e);
    }
}

async function loadConversation(convId) {
    try {
        const resp = await fetch(`/api/conversations/${convId}`);
        const conv = await resp.json();
        currentConvId = convId;
        document.getElementById('welcome').style.display = 'none';
        const messages = document.getElementById('messages');
        messages.innerHTML = '';
        conv.turns.forEach(t => {
            messages.innerHTML += renderTurn(t);
        });
        loadConversations();  // refresh active state
        scrollToBottom();
    } catch(e) {
        console.error('Failed to load conversation:', e);
    }
}

function newConversation() {
    currentConvId = null;
    document.getElementById('messages').innerHTML = '';
    document.getElementById('welcome').style.display = 'block';
    document.getElementById('questionInput').focus();
    loadConversations();
}

function askQuestion(q) {
    document.getElementById('questionInput').value = q;
    sendQuestion();
}

function renderTurn(turn) {
    const hasRows = turn.rows_preview && turn.rows_preview.length > 0;
    const tableId = 'table_' + Math.random().toString(36).slice(2);
    const sqlId = 'sql_' + Math.random().toString(36).slice(2);

    let tableHtml = '';
    if (hasRows) {
        const cols = turn.columns || Object.keys(turn.rows_preview[0] || {});
        tableHtml = `<div class="data-table-wrapper" id="${tableId}">
            <table class="data-table">
                <thead><tr>${cols.map(c => `<th>${escapeHtml(c)}</th>`).join('')}</tr></thead>
                <tbody>${turn.rows_preview.map(r =>
                    `<tr>${cols.map(c => `<td>${escapeHtml(String(r[c] ?? ''))}</td>`).join('')}</tr>`
                ).join('')}</tbody>
            </table>
        </div>`;
    }

    return `
        <div class="turn">
            <div class="user-msg">${escapeHtml(turn.user)}</div>
            <div class="assistant-msg">${renderMarkdown(turn.assistant_answer || '')}</div>
            <div class="turn-meta">
                ${turn.row_count ? `<span>${turn.row_count} row${turn.row_count !== 1 ? 's' : ''}</span>` : ''}
                <button class="sql-toggle" onclick="toggleEl('${sqlId}')">📝 SQL</button>
                ${hasRows ? `<button class="sql-toggle" onclick="toggleEl('${tableId}')">📊 Data</button>` : ''}
            </div>
            <div class="sql-panel" id="${sqlId}">${escapeHtml(turn.assistant_sql || '')}</div>
            ${tableHtml}
        </div>
    `;
}

function toggleEl(id) {
    document.getElementById(id)?.classList.toggle('show');
}

function scrollToBottom() {
    const c = document.getElementById('chatContainer');
    c.scrollTop = c.scrollHeight;
}

async function sendQuestion() {
    const input = document.getElementById('questionInput');
    const question = input.value.trim();
    if (!question) return;

    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;
    sendBtn.textContent = '...';

    document.getElementById('welcome').style.display = 'none';
    const messages = document.getElementById('messages');

    // Show user message + thinking
    const thinkingId = 'think_' + Math.random().toString(36).slice(2);
    messages.innerHTML += `
        <div class="turn" id="${thinkingId}">
            <div class="user-msg">${escapeHtml(question)}</div>
            <div class="assistant-msg">
                <div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            </div>
        </div>
    `;
    input.value = '';
    autoGrow(input);
    scrollToBottom();

    try {
        const resp = await fetch('/api/ask', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question, conversation_id: currentConvId }),
        });
        const data = await resp.json();

        // Remove thinking indicator
        document.getElementById(thinkingId)?.remove();

        if (data.error) {
            messages.innerHTML += `
                <div class="turn">
                    <div class="user-msg">${escapeHtml(question)}</div>
                    <div class="error-msg">${escapeHtml(data.error)}</div>
                </div>
            `;
        } else {
            currentConvId = data.conversation_id;
            messages.innerHTML += renderTurn({
                user: question,
                assistant_answer: data.answer,
                assistant_sql: data.sql,
                row_count: data.row_count,
                columns: data.columns,
                rows_preview: data.rows,
            });
            loadConversations();
        }
        scrollToBottom();
    } catch(e) {
        document.getElementById(thinkingId)?.remove();
        messages.innerHTML += `
            <div class="error-msg">Request failed: ${escapeHtml(e.message)}</div>
        `;
    } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send';
        input.focus();
    }
}

async function checkHealth() {
    try {
        const resp = await fetch('/api/health');
        const data = await resp.json();
        const dot = document.getElementById('healthDot');
        const text = document.getElementById('healthText');
        if (data.db === 'connected' && data.has_api_key) {
            dot.classList.remove('bad');
            text.textContent = 'DB connected';
        } else {
            dot.classList.add('bad');
            text.textContent = !data.has_api_key ? 'No API key' : 'DB offline';
        }
    } catch(e) {
        document.getElementById('healthDot').classList.add('bad');
        document.getElementById('healthText').textContent = 'Server offline';
    }
}

loadSuggestions();
loadConversations();
checkHealth();
setInterval(checkHealth, 30000);
</script>
</body>
</html>
